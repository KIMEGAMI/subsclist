name: Vercel Production

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: false

env:
  VERCEL_CLI_VERSION: 55.0.0
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  deploy-production:
    name: Deploy production
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Validate Vercel configuration
        run: |
          test -n "${VERCEL_TOKEN}" || (echo "::error::Missing VERCEL_TOKEN" && exit 1)
          test -n "${VERCEL_ORG_ID}" || (echo "::error::Missing VERCEL_ORG_ID" && exit 1)
          test -n "${VERCEL_PROJECT_ID}" || (echo "::error::Missing VERCEL_PROJECT_ID" && exit 1)

      - name: Pull Vercel environment
        run: npx --yes "vercel@${VERCEL_CLI_VERSION}" pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build Vercel artifacts
        run: npx --yes "vercel@${VERCEL_CLI_VERSION}" build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy production
        run: npx --yes "vercel@${VERCEL_CLI_VERSION}" deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
